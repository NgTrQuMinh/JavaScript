    <script>
        // 1. Cách khai báo Biến (Variables)
        // Hiện nay, chúng ta có 3 từ khóa chính để tạo "hộp" chứa dữ liệu:

        // let: Dùng cho các giá trị có thể thay đổi trong tương lai(ví dụ: điểm số, số dư tài khoản).
        // const: Viết tắt của constant(hằng số).Dùng cho các giá trị không được phép thay đổi sau khi đã gán(ví dụ: ngày sinh, số CMND).
        // var: Cách cũ(trước năm 2015).Hiện nay ít dùng vì dễ gây lỗi "nhầm lẫn" phạm vi hoạt động.Lời khuyên: Hãy ưu tiên dùng const, nếu cần thay đổi thì mới dùng let.

        const pi = 3.14; // Không thay đổi được
        let age = 25;    // Có thể tăng lên 26 vào năm sau


    </script>
