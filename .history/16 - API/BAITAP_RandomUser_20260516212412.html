<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>    
        const API = 'https://randomuser.me/api';

        const getData = async () => {
            try {   
                const response = await fetch(API);
                if (!response.ok) {
                    throw new Error('Kết nối mạng có vấn đề!');
                }   
                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.error(error)
            }
        }

    </script>
</body>

</html>
