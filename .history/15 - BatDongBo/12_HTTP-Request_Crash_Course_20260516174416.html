<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. Bản chất của một HTTP Request
        // Mỗi request cần 2 yếu tố cơ bản: URL (địa chỉ gửi đến) và Method (phương thức hành động):
        // GET: Lấy dữ liệu về (Mặc định).
        // POST: Gửi dữ liệu mới lên server (ví dụ: đăng ký tài khoản, đăng bài viết).
        // PUT/PATCH: Cập nhật dữ liệu đã có.
        // DELETE: Xóa dữ liệu.

        // 2. Cách viết chuẩn hiện đại: async/await
        // Vì việc gửi nhận dữ liệu qua mạng mất thời gian (bất đồng bộ - asynchronous), chúng ta dùng async/await đặt trong khối try...catch để bắt lỗi nếu có sự cố.
        // Lấy dữ liệu (GET Request)
        async function layDuLieuUser() {
            try {
                // 1. Chờ phản hồi từ server
                const response = await fetch('https://jsonplaceholder.typicode.com/users/1');

                // 2. Kiểm tra nếu lỗi HTTP (ví dụ: 404, 500)
                if (!response.ok) {
                    throw new Error(`Lỗi HTTP! Tình trạng: ${response.status}`);
                }

                // 3. Chuyển đổi phản hồi sang dạng JSON (object trong JS)
                const data = await response.json();
                console.log("Dữ liệu nhận được:", data);
            } catch (error) {
                // Xử lý lỗi kết nối mạng hoặc lỗi từ block try
                console.error("Không thể lấy dữ liệu:", error);
            }
        }
        layDuLieuUser();

        // Gửi dữ liệu lên (POST Request)
        // Khi gửi dữ liệu đi, bạn cần định nghĩa thêm method, chuyển dữ liệu thành chuỗi JSON và thêm headers để server hiểu kiểu dữ liệu bạn gửi.
        async function taoBaiVietMoi() {
            const url = 'https://jsonplaceholder.typicode.com/posts';

            // Dữ liệu muốn gửi đi
            const dataPost = {
                title: 'Học HTTP Request',
                body: 'Khóa học cấp tốc bằng tiếng Việt!',
                userId: 1
            };

            try {
                const response = await fetch(url, {
                    method: 'POST', // Đổi phương thức thành POST
                    headers: {
                        'Content-Type': 'application/json' // Báo cho server biết đây là JSON
                    },
                    body: JSON.stringify(dataPost) // Chuyển Object JS thành chuỗi JSON
                });

                if (!response.ok) throw new Error(`Lỗi: ${response.status}`);

                const ketQua = await response.json();
                console.log('Tạo thành công:', ketQua);
            } catch (error) {
                console.error('Lỗi khi gửi dữ liệu:', error);
            }
        }

        taoBaiVietMoi();
    </script>
</body>

</html>
