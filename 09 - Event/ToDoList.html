<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Chú Công Việc - Pro Todo</title>
    <link rel="stylesheet" href="ToDoList.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="todo">
        <h2 class="todo-title">My Tasks</h2>
        <form class="todo-form">
            <input class="todo-input" type="text" name="todoValue" placeholder="Nhập công việc ngay..." required>
            <button class="todo-submit" type="submit">Thêm</button>
        </form>
        <div class="todo-list">
            <!-- <div class="todo-item">
                <span class="todo-text">Học tiếng Anh mỗi ngày</span>
                <button class="todo-remove">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div> -->
        </div>
    </div>
    <script src="ToDoList.js"></script>
</body>
</html>
