<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: rgba(83, 143, 83, 0.716);
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .Form {
            background-color: rgb(255, 255, 255);
            padding: 50px;

            & .Btn__Summit {
                width: 400px;
                background-color: rgba(145, 255, 145, 0.863);
                border: 1px solid #cccccc;
                padding: 10px;
            }
        }

        input {
            width: 400px;
            background-color: #d6d6d6;
            border: 1px solid #cccccc;
            padding: 10px;
        }

        /* Nhập Input Pass Sai */
        .Input__Error__Passworld {
            border: 1px solid red;
        }
    </style>
</head>

<body>
    <h1 style="color: rgb(0, 255, 170);">Lab - 04</h1>
    <div class="container">
        <div class="Form">
            <input class="Input__User" type="text" name="name" id="name" placeholder="UserName" required>
            <br><br>
            <input class="Input__Passworld" type="password" name="password" id="password" placeholder="Passworld"
                required>
            <br><br>
            <button class="Btn__Summit">Đăng Nhập</button>
        </div>
    </div>
    <script>
        // Khai Báo Input và Summit.
        const Input__User = document.querySelector(".Input__User");
        const Input__Passworld = document.querySelector(".Form .Input__Passworld");
        const Btn__Summit = document.querySelector(".Btn__Summit");

        const Check__Input__Btn = () => {
            const Value__Input__Name = Input__User.value;
            const Value__Input__Pasworld = Input__Passworld.value;

            const UserName = "NgTrQuMinh";
            const Pasworld = "12345";

            if (Value__Input__Name === UserName && Value__Input__Pasworld === Pasworld) {
                alert("Đăng Nhập Thành Công");
                window.location.href = "./ToDoList.html"
                localStorage.setItem("user_name", Value__Input__Name);
            }
            else {
                alert("Đăng Nhập Sai");
                localStorage.removeItem("user_name");
                localStorage.removeItem("password");

                // Chèn thêm class khi sai
                Input__Passworld.classList.add("Input__Error__Passworld");

                // Xóa trắng input để người dùng nhập lại
                Input__Passworld.value = "";
                Input__Passworld.focus();
            }
        }
        Btn__Summit.addEventListener("click", Check__Input__Btn)
    </script>
</body>

</html>
