<body>
    <script>
        // Static methods (phương thức tĩnh) là các hàm thuộc về chính Class đó, thay vì thuộc về các đối tượng (instances) được tạo ra từ class.
        // Nói cách khác, bạn gọi chúng trực tiếp từ tên Class mà không cần dùng từ khóa new để tạo đối tượng.

        class User {
            static userCount = 0;

            constructor(name, age) {
                this.name = name;
                this.age = age;
                User.userCount++;
            }

            static getUserCount() {
                return User.userCount;
            }

            static renderUserCount() {
                console.log(`User count: ${User.userCount}`); 
            }

            get name() {
                return this._name;
            }

            get age() {
                return this._age;
            }

            info() {
                return `Name: ${this._name}, Age: ${this._age}`;
            }

            set name(newName) {
                if (typeof(newName) !== "string" || newName.length === 0) {
                    console.error("Name must be a non-empty string");
                }
                this._name = newName;
            }

            set age(newAge) {
                if (typeof(newAge) === "number" && newAge > 0) {
                    this._age = newAge;
                } else {
                    console.error("Age must be a positive number");
                }
            }
        }
        const user1 = new User("Minh", 19);
        const user2 = new User("Nhat", 19);
        const user3 = new User("Tuan", 19);
        
        console.log(user1._name) // Minh
        console.log(user1._age) // 19
        console.log(user1); // User {name: "Minh", age: 19} -> Object
        console.log(user1.info());  // Name: Minh, Age: 19

        console.log(User.getUserCount()); // Goi Class User.getUserCount() de lay so luong user = 3.
        User.renderUserCount(); // Goi Class User.renderUserCount() de in ra so luong user = 3.
