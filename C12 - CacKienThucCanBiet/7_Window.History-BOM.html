<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // window.history trong BOM cho phép JavaScript truy cập và thao tác với lịch sử duyệt web của người dùng (các trang đã truy cập trong tab hiện tại)
        // 2. Các thuộc tính và phương thức phổ biến
        // Thuộc tính:
        // history.length: Trả về số lượng các trang có trong lịch sử của cửa sổ hiện tại.
        // Phương thức điều hướng:
        // history.back(): Tương đương với việc nhấn nút Back trên trình duyệt (quay lại trang trước).
        // history.forward(): Tương đương với việc nhấn nút Forward (đi tới trang tiếp theo nếu có).
        // history.go(n): Di chuyển đến một trang cụ thể. Ví dụ: go(-1) là quay lại, go(1) là tiến tới, go(0) là tải lại trang hiện tại.

        // 3. Thao tác với Lịch sử (HTML5 History API)
        // history.pushState(): Thêm một trạng thái mới vào lịch sử (thay đổi URL).
        // history.replaceState(): Thay thế trạng thái hiện tại bằng một trạng thái mới.

</script>
</body>
</html>
