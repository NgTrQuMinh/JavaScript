        // Bước đệ quy (Recursive Step): Phần thân hàm thực hiện logic và gọi lại chính nó với các tham số mới (thường là dữ liệu nhỏ hơn hoặc đơn giản hơn)

        // 2. Ví dụ minh họa: Tính Giai thừa
        // Giai thừa của một số được tính bằng n x (n - 1) x ... x 1
        function dequy(n) {
            if (n === 1) {
                return 1;
            }
            return n * dequy(n - 1);
        }
