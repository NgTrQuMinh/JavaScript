<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // window.navigator là nơi lưu trữ toàn bộ thông tin về trình duyệt và thiết bị mà 
        // người dùng đang sử dụng để truy cập website

        // 1. Các thuộc tính phổ biến
        // navigator.userAgent: Trả về sử dụng người dùng dùng trình duyệt nây
        // language: Trả về ngôn ngữ được thiết lập trên trình duyệt (ví dụ: en-US, vi).
        // onLine: Trả về giá trị true nếu trình duyệt đang có kết nối internet và false nếu ngoại tuyến.
        // cookieEnabled: Kiểm tra xem trình duyệt của người dùng có đang bật cookie hay không.
        // platform: Trả về tên hệ điều hành mà trình duyệt đang chạy (ví dụ: Win32, MacIntel).
        // appName & appCodeName: Trả về tên và mã tên của trình duyệt

        // 2. Các phương thức hữu ích
        // Ngoài các thông tin tĩnh, navigator còn cung cấp các API hiện đại để tương tác với phần cứng:
        // geolocation: Cho phép lấy vị trí địa lý của người dùng (nếu được cho phép).
        // clipboard: Dùng để đọc hoặc ghi dữ liệu vào khay nhớ tạm (copy/paste).
        // mediaDevices: Truy cập vào camera hoặc microphone của thiết bị.
    </script>
</body>
</html>
