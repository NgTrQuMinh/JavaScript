<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Menu Fix</title>
    <style>
        .Menu {
            width: 350px;
            background-color: antiquewhite;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            list-style: none;
            margin: 10px 0;
            padding: 20px 15px; 
            transform: translateX(100%);
            transition: transform 0.25s ease-in-out; 
        }
        .Menu.ShowMenu {
            transform: translateX(0%);
        }

        .Menu .List {
            display: block;
            padding: 20px 15px;
            border-bottom: 1px solid gray;
        }

        .Menu .List .Item {
            color: black;
            text-decoration: none; 
            font-size: 22px;
        }
    </style>
</head>
<body>

    <ul class="Menu">  
        <li class="List"><a href="#" class="Item">1</a></li>
        <li class="List"><a href="#" class="Item">2</a></li>
        <li class="List"><a href="#" class="Item">3</a></li>
        <li class="List"><a href="#" class="Item">4</a></li>
        <li class="List"><a href="#" class="Item">5</a></li>
    </ul>

    <button class="btn">Click Me!</button>

    <script>
        const Menu = document.querySelector(".Menu");
        const btn = document.querySelector(".btn");

        btn.addEventListener('click', () => {
            Menu.classList.toggle("ShowMenu");
        });
    </script>
</body>
</html>
