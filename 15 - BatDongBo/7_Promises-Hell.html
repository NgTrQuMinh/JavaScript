<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Promise Hell
        const Run1 = new Promise((resolve, reject) => {
            setTimeout(() => {
                resolve("Run the fist time");
            }, 3000);
        })

        Run1.then((data) => {
            console.log(data);
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve("Run the second time");
                }, 3000);
            })
        }) 

        .then((data) => {
            console.log(data);
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve("Run the third time");
                }, 3000);
            })
        })

        .then((data) => {
            console.log(data);
        })
    </script>
</body>
</html>
