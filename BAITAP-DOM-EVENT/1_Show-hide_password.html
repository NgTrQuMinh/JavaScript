<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 1: Hiển thị mật khẩu</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .password-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input {
            padding: 8px;
            font-size: 16px;
        }

        .toggle-eye {
            cursor: pointer;
            user-select: none;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <h2>Bài 1: Hiển thị/ẩn mật khẩu</h2>
    <div class="password-container">
        <input type="password" id="passwordInput" placeholder="Nhập mật khẩu">
        <span class="toggle-eye" id="toggleEye">👁️</span>
    </div>
    <p>Yêu cầu: Khi nhấn vào icon mắt, đổi type của input giữa 'password' và 'text', đồng thời đổi icon (👁️ → 🙈).</p>

    <script>
        // Gợi ý: lấy phần tử input và span, thêm sự kiện click cho span
        const passwordInput = document.getElementById("passwordInput");
        const toggleEye = document.getElementById("toggleEye");

        toggleEye.addEventListener("click", (e) => {
            if (passwordInput.type === "password") {
                toggleEye.textContent = "🙈"
                passwordInput.setAttribute("type", "text");
            } else {
                toggleEye.textContent = "👁️"
                passwordInput.setAttribute("type", "password");
            }
        })

    </script>
</body>

</html>
