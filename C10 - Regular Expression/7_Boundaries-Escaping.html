<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Escaping \ / [ ] ( ) { } ? + * | . ^ $
        /\?/.test("?");    // có hoặc là 0 
        /\*/.test("?");  // 0 hoặc nhiều

        // Boundaries \b \B
        "my name is minh".match(/\bminh/g);  // [minh]
        
        "my name is minh".match(/\Bminh/g);  // null
        "my name isminh".match(/\Bminh/g);  // phải đứng cạnh nhau
        </script>
</body>
</html>
