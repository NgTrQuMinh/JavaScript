<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //  Bài 5. In phần tử: in ra các phần tử là số chẵn ở chỉ số chẵn, nếu mảng không tồn tại phần tử như vậy thì in ra "NONE".
        const Arr = [-971, 107, 458, 222, 200]; // 458 200

        let cnt = 0;
        Arr.forEach((value, index) => {
            if (value % 2 === 0 && index % 2 === 0) {
                console.log(value);
                ++cnt;
            }
        });
        if (cnt === 0) {
            console.log("NONE");
        }
    </script>
</body>
</html>
