<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        // Bài 30. Mảng đánh dấu 5
        // hãy tìm giá trị có số lần xuất hiện nhiều nhất trong mảng, nếu có nhiều giá trị có cùng số lần xuất hiện thì 
        // lấy giá trị xuất hiện trước theo thứ tự trong mảng

        const Arr = [1, 2, 2, 1];

        const Mark = new Array(1000).fill(0);

        Arr.forEach(value => {
            Mark[value]++;
        });

        let Maxcnt = -1e9, indexMax;
        Arr.forEach(i => {
            if (Mark[i] !== 0) {
                if (Mark[i] > Maxcnt) {
                    Maxcnt = Mark[i];
                    indexMax = i;
                }
                Mark[i] = 0;
            }
        });
        console.log(Maxcnt, indexMax);

    </script>
</body>

</html>
