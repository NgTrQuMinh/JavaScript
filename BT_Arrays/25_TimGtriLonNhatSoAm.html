<body>
    <script>
        // Bài 25: Tìm số âm lớn nhất trong Arr.
        const Arr = [1, 3, -2, -5, 2, -2, -1, 5];

        const maxNegative = Arr.reduce((max, current) => {
            // Chỉ xét các số âm
            if (current < 0) {
                // Nếu max chưa có giá trị (null) hoặc current lớn hơn max hiện tại
                if (max === null || current > max) {
                    return current;
                }
            }
            return max;
        }, null); // Khởi tạo giá trị ban đầu là null

        console.log(maxNegative); // Kết quả: -1


    </script>
</body>
