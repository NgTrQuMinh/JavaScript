<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Nhóm Khởi tạo từ mảng -> object: Object.fromEntries() 
        const entries = [
            ['thành_phố', 'Hà Nội'],
            ['dân_số', '8 triệu']
        ];

        const obj = Object.fromEntries(entries);
        console.log(obj); // { thành_phố: "Hà Nội", dân_số: "8 triệu" }


    </script>
</body>
</html>
