<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Nhóm Kiểm tra: Object.hasOwn(object, "check")
        const person = { name: "An" };

        console.log(Object.hasOwn(person, "name"));     // true
        console.log(Object.hasOwn(person, "toString")); // false (vì toString nằm trong prototype)

    </script>
</body>
</html>
