<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <ul class="list">

    </ul>
    <script>
        // Fetch API. : "https://fakestoreapi.com/products"
        // 1. Khái niệm cơ bản: Request & Response
        // Request (Yêu cầu): Bạn (Client) đưa menu và yêu cầu món ăn.
        // Response (Phản hồi): Người phục vụ mang món ăn (Dữ liệu) từ nhà bếp (Server) ra cho bạn.

        // 2. Sử dụng async/await (Khuyên dùng)
        // Viết bằng async/await giúp code trông sạch sẽ, dễ đọc và giống như code chạy tuần tự hơn so với cách dùng .then().catch().
        const listContainer = document.querySelector('.list');

        /**
         * 1. Hàm Render: Chuyên trách hiển thị UI
         * Giúp bạn dễ dàng thay đổi giao diện mà không cần động vào logic gọi API
         */
        function renderPosts(posts) {
            if (!posts || posts.length === 0) {
                listContainer.innerHTML = '<p>Không có dữ liệu hiển thị.</p>';
                return;
            }

            const html = posts.map(post => `
                <div class="post-item" style="margin-bottom: 20px; border-bottom: 1px solid #ddd; padding: 10px;">
                    <h3 style="color: #2c3e50; text-transform: capitalize;">${post.title}</h3>
                    <p style="color: #7f8c8d;">${post.body}</p>
                </div>
            `).join('');

            listContainer.innerHTML = html;
        }

        /**
         * 2. Hàm Fetch: Chuyên trách lấy dữ liệu
         */
        async function getPosts() {
            try {
                // Hiển thị trạng thái chờ (Skeleton hoặc Loading)
                listContainer.innerHTML = '<p>Đang tải bài viết...</p>';

                const response = await fetch('https://jsonplaceholder.typicode.com/posts?_limit=10'); // Giới hạn 10 bài

                if (!response.ok) {
                    throw new Error('Kết nối mạng có vấn đề!');
                }

                const data = await response.json();

                // Gọi hàm render sau khi có dữ liệu
                renderPosts(data);

            } catch (error) {
                renderError(error.message);
            }
        }

        /**
         * 3. Hàm Xử lý lỗi: Hiển thị lỗi lên UI cho người dùng
         */
        function renderError(message) {
            listContainer.innerHTML = `
            <div style="color: red; padding: 20px; border: 1px dashed red;">
                <strong>Lỗi:</strong> ${message}
            </div>
            `;
        }

        // 4. Khởi chạy ứng dụng
        getPosts();

        // 3. Các phương thức HTTP phổ biến
        // Khi làm việc với API, bạn thường thực hiện 4 hành động chính (gọi tắt là CRUD):
        // Phương thức	        Hành động	        Mục đích
        // GET	                Read	        Lấy dữ liệu từ server về.
        // POST	                Create	        Gửi dữ liệu mới lên server (ví dụ: đăng ký tài khoản).
        // PUT	                Update	        Cập nhật dữ liệu đã tồn tại trên server.
        // DELETE	            Delete	        Xóa dữ liệu trên server.

        // 4. Gửi dữ liệu lên Server (POST)
        const guiDuLieu = async () => {
            const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json' // Báo cho server biết ta gửi dữ liệu JSON
                },
                body: JSON.stringify({
                    title: 'Học JavaScript API',
                    body: 'Nội dung bài viết...',
                    userId: 1
                })
            });

            const result = await response.json();
            console.log('Kết quả sau khi gửi:', result);
        };

        // 5. Các thuật ngữ cần nhớ
        // JSON: Định dạng dữ liệu phổ biến nhất hiện nay (trông giống như Object trong JS).
        // Endpoint: Đường dẫn URL cụ thể để lấy dữ liệu (ví dụ: /users, /products).
        // API Key: "Mật khẩu" mà một số API yêu cầu để định danh người dùng.
        // Status Code: Mã phản hồi từ server (ví dụ: 200 là thành công, 404 là không tìm thấy trang).
    </script>
</body>

</html>
