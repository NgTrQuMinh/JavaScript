<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // SAO CHÉP MẢNG GỒM 2 CÁCH:
        // 1. Sử dụng phương thức .Slice()
        const copy_Arr = [1, 2, 3, 4, 5];

        const newArr1 = copy_Arr.slice();
        console.log(newArr1);

        // 2. Spread Operator [... Arr]
        const spreadArr1 = [...copy_Arr];
        console.log(spreadArr1);

        // GROUP MẢNG GỒM 2 CÁCH:
        // 1. Sử dụng phương thức .concat()
        const GROUP_ARR = [5, 6, 7, 8, 9];

        const newArr2 = GROUP_ARR.concat([11, 12, 13, 14, 15]);
        console.log(newArr2);

        // 2. Spread Operator [... Arr, ... Arr, ...Arr]
        const spreadArr2 = [...GROUP_ARR, ...GROUP_ARR, ...GROUP_ARR];
        console.log(spreadArr2);  
    </script>
</body>
</html>
