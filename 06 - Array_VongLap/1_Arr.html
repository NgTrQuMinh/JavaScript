<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. Khởi tạo Mảng (Initialization)
        // Cách 1: Arr Literal
        const arr1 = [];

        // Cách 2: Arr Constructor
        const arr2 = new Array().fill(0);

        // Mảng đơn giản: Arr = [1, false, undifine, null, "ngtrquminh"];
        // Mảng phức tạp: Arr = [1, false, ["ngtrquminh", true, 0], 1200, undifine];

        // Mảng rỗng: Empty Array = []

        // 2. Truy cập và Chỉnh sửa
        // index: vị trí của phần tử trong mảng bắt đầu từ 0.
        // length: độ dài của mảng, đến từ 1.
        const fruits = ['Táo', 'Chuối', 'Xoài'];
        // Lấy phần tử: fruits[0] (Trả về 'Táo').
        // Lấy phần tử cuối: fruits[fruits.lenggth - 1];

        // Thay đổi phần tử: fruits[1] = 'Dâu';.
        // Độ dài mảng: fruits.length. 
    </script>
</body>

</html>
