    <script>
        const MaxOneTwo = ((Arr) => {
            let max1 = -Infinity;
            let max2 = -Infinity;
            for (let i = 0; i < Arr.length; i++) {
                if (Arr[i] > max1) {
                    max2 = max1;
                    max1 = Arr[i];
                }
                else if (Arr[i] > max2) {
                    max2 = Arr[i];
                }
            }
            console.log(max1);
            console.log(max2);
        })

        const Arr = [996817, 993012, 990914, 998837];
        MaxOneTwo(Arr);
