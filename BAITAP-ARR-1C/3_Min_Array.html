<body>
    <script>
        // Bài 3. Số nhỏ nhất: hãy đếm xem trong mảng bao nhiêu số có cùng giá trị nhỏ nhất.

        const Arr = [1, 2, 1, 3, 5]; // 1 2 

        let min = 1e9;
        for (const value of Arr) {
            if (value < min) {
                min = value;
            }
        }

        let cnt = 0;
        for (const value of Arr) {
            if (value === min) {
                ++cnt;
            }
        }
        console.log(min,cnt);
    </script>
</body>
