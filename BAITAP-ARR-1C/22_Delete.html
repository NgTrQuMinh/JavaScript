<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // Bài 22. Xóa
        const Arr = [359, 523, 428, 952, 752, 195, 613, 6, 122];
        console.log(Arr);
        
        let K = 359;

        // Cách 1:
        let position = Arr.indexOf(K);
        if (position === -1) {
            console.log("NOT FOUND");
        } else {
            // Nếu dùng toSpliced (ES2023), phải gán vào biến mới
            const newArr = Arr.toSpliced(position, 1);
            console.log(newArr);
        }



        // Cách 2: 
        let Check = -1;
        for (const [index, value] of Arr.entries()) {
            if (Arr[index] === K) {
                Check = index;
                break;
            }
        }

        if (Check === -1) {
            console.log("NOT FOUND");
        } else {
            for (let i = Check; i < Arr.length; i++) {
                Arr[i] = Arr[i + 1];
            }

            Arr.forEach((value, index) => {
                console.log(value);
            });
        }
    </script>
</body>

</html>
