<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So sánh Inner vs Outer Width</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .value {
            font-size: 2rem;
            font-weight: bold;
            color: #007bff;
        }

        .label {
            color: #555;
            margin-bottom: 10px;
        }

        .box {
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Kích thước Cửa sổ</h2>

        <div class="box">
            <div class="label">window.innerWidth (Nội dung)</div>
            <div id="inner" class="value">0 px</div>
        </div>

        <div class="box">
            <div class="label">window.outerWidth (Toàn bộ)</div>
            <div id="outer" class="value">0 px</div>
        </div>

        <div class="box">
            <div class="label">window.innerHeight (Nội dung)</div>
            <div id="iHeight" class="value" style="color: #28a745;">0 px</div>
        </div>

        <div class="box">
            <div class="label">window.outerHeight (Toàn bộ)</div>
            <div id="oHeight" class="value" style="color: #28a745;">0 px</div>
        </div>

        <p style="margin-top: 20px; color: #888;">Thử co giãn trình duyệt để xem thay đổi!</p>
    </div>

    <script>
        function updateWidths() {
            // Lấy giá trị từ đối tượng window
            const iWidth = window.innerWidth;
            const oWidth = window.outerWidth;

            // Hiển thị lên màn hình
            document.getElementById('inner').innerText = iWidth + " px";
            document.getElementById('outer').innerText = oWidth + " px";
        }
        window.addEventListener('load', updateWidths);
        window.addEventListener('resize', updateWidths);

        function updateDimensions() {
            // Cập nhật chiều rộng (như cũ)
            document.getElementById('inner').innerText = window.innerWidth + " px";
            document.getElementById('outer').innerText = window.outerWidth + " px";

            // Cập nhật chiều cao (mới)
            document.getElementById('iHeight').innerText = window.innerHeight + " px";
            document.getElementById('oHeight').innerText = window.outerHeight + " px";
        }
        window.addEventListener('load', updateDimensions);
        window.addEventListener('resize', updateDimensions);

    </script>

</body>

</html>
