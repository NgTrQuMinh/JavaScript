<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. (Cơ Bản)
        // Arr.length -> Độ dài của mảng.
        // Arr.sort() -> Sắp xếp theo string.
        // Arr.sort((a, b) => a - b) -> Sắp xếp theo number.
        // Arr.reverse() -> Đảo ngược mảng.
        // Arr.join() -> Nối các phần tử trong mảng thành string.
        // Arr.Concat(arr) -> Kết hợp mảng.
        // Arr.split() -> Chuyển đối string thành Arr.
        // Arr.flat() -> Làm phẳng Arr.

        // 2. (Thêm/Xóa phần tử/ trích xuất)
        // Arr.push() -> Thêm cuối.	
        // Arr.pop() -> Xóa  cuối.
        // Arr.unshift() -> Thêm đầu.	
        // Arr.shift() -> Xóa đầu.
        // Arr.splice()	-> (vị_trí_bắt_đầu, số_lượng_xóa, phần_tử_thêm_vào...).
        // Arr.slice() -> (vị_trí_bắt_đầu_trích xuất -> vị_trí_cuối_trích xuất) Nếu ko truền giá trị sẽ lấy hết.

        // 3. (Kiểm tra sự tồn tại của value)
        // Arr.includes() -> Có giá trị cụ thể không?
        // Arr.indexOf() -> Trả về vị trí (index) --- Arr.lastIndexOf(value) -> tìm tử cuối mảng lên.

        // 4. (Kiểm tra dựa trên Điều kiện)
        // Arr.every(if-else) -> Tất cả phải thỏa điều kiện?
        // Arr.some() –> Có ít nhất 1 phần tử thỏa điều kiện?
        
        // Arr.find() -> Trả về value thỏa mãn điều kiện đầu tiên?
        // Arr.findIndex() -> Trả về index thỏa mãn điều kiện đầu tiên?
    </script>
